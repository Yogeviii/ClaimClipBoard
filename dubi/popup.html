<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Claim Copy Buttons</title>
    <style>
      body {
        color: #1f2933;
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        min-width: 240px;
        padding: 12px;
      }

      button {
        align-items: center;
        background: #168a2f;
        border: 1px solid #0f6722;
        border-radius: 4px;
        color: #fff;
        cursor: pointer;
        display: inline-flex;
        font-size: 13px;
        font-weight: 700;
        justify-content: center;
        min-height: 34px;
        padding: 7px 10px;
        width: 100%;
      }

      button:disabled {
        cursor: default;
        opacity: 0.7;
      }

      #status {
        color: #52606d;
        font-size: 12px;
        line-height: 1.35;
        margin-top: 8px;
        min-height: 32px;
      }
    </style>
  </head>
  <body>
    <button id="apply" type="button">Apply Claim Copy Buttons</button>
    <div id="status">Use this on the E-nsure tab if buttons are missing.</div>
    <script src="popup.js"></script>
  </body>
</html>
